name: Daily Update V2Ray Nodes from cczzuu

on:
  schedule:
    - cron: '5 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get dates
        id: date
        run: |
          echo "TODAY=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "YESTERDAY=$(date -d 'yesterday' +%Y%m%d 2>/dev/null || date -v-1d +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create directories
        run: mkdir -p temp docs

      - name: Fetch from comm.cczzuu.top
        run: |
          URL="http://comm.cczzuu.top/node/${{ steps.date.outputs.TODAY }}-v2ray.txt"
          echo "Fetching: $URL"
          curl -sL --max-time 30 "$URL" -o temp/nodes_raw.txt
          
          SIZE=$(wc -c < temp/nodes_raw.txt | tr -d ' ')
          if [ "$SIZE" -lt 100 ]; then
            echo "Today failed, trying yesterday..."
            URL="http://comm.cczzuu.top/node/${{ steps.date.outputs.YESTERDAY }}-v2ray.txt"
            curl -sL --max-time 30 "$URL" -o temp/nodes_raw.txt
          fi
          
          SIZE=$(wc -c < temp/nodes_raw.txt | tr -d ' ')
          echo "Downloaded: $SIZE bytes"
          
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: No valid data from cczzuu"
            exit 1
          fi

      - name: Parse nodes
        run: |
          python3 -c "
import base64, re, json

with open('temp/nodes_raw.txt', 'r') as f:
    content = f.read().strip()

# Decode if base64
if re.match(r'^[A-Za-z0-9+/]*={0,2}$', content) and len(content) % 4 == 0 and len(content) > 20:
    try:
        content = base64.b64decode(content).decode('utf-8', errors='ignore')
    except: pass

nodes = []
protocols = ['vmess://', 'vless://', 'ss://', 'ssr://', 'trojan://', 'hysteria://', 'hysteria2://', 'tuic://']
for line in content.split('\n'):
    line = line.strip()
    if line and any(line.startswith(p) for p in protocols):
        nodes.append(line)

print(f'Parsed {len(nodes)} nodes')
with open('temp/nodes.json', 'w') as f:
    json.dump(nodes, f)
"

      - name: Health Check
        run: python3 scripts/health_check.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || {
            git commit -m "Update nodes for ${{ steps.date.outputs.TODAY }}"
            git push
          }

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "## ✅ 订阅更新完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**固定订阅地址：**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/node.txt" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**日期：** ${{ steps.date.outputs.TODAY }}" >> $GITHUB_STEP_SUMMARY
